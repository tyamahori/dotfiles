#cloud-config
# Ubuntu 24.04 cloud-init for OrbStack VM
#
# Usage:
#   orb create -c cloud-init/ubuntu.yaml ubuntu:24.04 dev
#
# Reproduces the macOS dev environment as closely as possible on Linux:
#   - zsh + linked dotfiles from tyamahori/dotfiles
#   - Nix (Determinate Systems) + Devbox with the same global packages as scripts/devbox
#   - gh CLI (apt) + gh-copilot extension
# macOS-only items (Homebrew casks, mas) are intentionally skipped.

package_update: true
package_upgrade: false

packages:
  - zsh
  - git
  - curl
  - ca-certificates
  - xz-utils
  - build-essential
  - direnv

runcmd:
  # Resolve the OrbStack-provisioned user (uid 1000) and switch their shell to zsh.
  - bash -c 'getent passwd 1000 | cut -d: -f1 > /tmp/default_user'
  - bash -c 'chsh -s /usr/bin/zsh "$(cat /tmp/default_user)"'

  # Nix (Determinate Systems, multi-user with systemd).
  - bash -c 'curl --proto "=https" --tlsv1.2 -sSf -L https://install.determinate.systems/nix | sh -s -- install linux --no-confirm'

  # gh CLI from official apt repo.
  - bash -c 'install -dm 0755 /etc/apt/keyrings && curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg -o /etc/apt/keyrings/githubcli-archive-keyring.gpg && chmod go+r /etc/apt/keyrings/githubcli-archive-keyring.gpg && echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" > /etc/apt/sources.list.d/github-cli.list && apt-get update && apt-get install -y gh'

  # Devbox (installed as the default user).
  - bash -c 'su - "$(cat /tmp/default_user)" -c "curl -fsSL https://get.jetify.com/devbox | bash -s -- -f"'

  # Clone dotfiles repo and symlink into $HOME via scripts/link.
  - bash -c 'su - "$(cat /tmp/default_user)" -c "mkdir -p ~/project && git clone https://github.com/tyamahori/dotfiles.git ~/project/dotfiles && ~/project/dotfiles/scripts/link"'

  # Same packages as scripts/devbox on macOS, minus mas (mac-only).
  - bash -c 'su - "$(cat /tmp/default_user)" -c "PATH=\$HOME/.local/bin:/nix/var/nix/profiles/default/bin:\$PATH devbox global add php go direnv bun git nodejs httpie cmake curl task"'

  # gh-copilot extension (no-op until the user runs gh auth login).
  - bash -c 'su - "$(cat /tmp/default_user)" -c "gh extension install github/gh-copilot || true"'

final_message: "dotfiles setup finished. Run `gh auth login` and open a new shell."