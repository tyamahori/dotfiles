onboarding = false

[ui]
agent_panel_sort = "priority"
show_agent_labels_on_pane_borders = true

# Claude Code の Stop/Notification フック(claude/hooks/herdr-notify.sh)が
# terminal-notifier で独自フォーマットの macOS 通知を出すため、標準通知は無効。
# 注意: codex / copilot ペインはフック未対応なので現状は通知なし。
[ui.toast]
delivery = "off"

[ui.sound]
enabled = false

# reviewr サイドバーのトグル。auto-open は worktree.created 限定なので、
# worktree を使わない workspace ではこのキーで開閉する。
[[keys.command]]
key = "cmd+r"
type = "plugin_action"
command = "persiyanov.reviewr.toggle"

[experimental]
pane_history = true
switch_ascii_input_source_in_prefix = true
reveal_hidden_cursor_for_cjk_ime = true
cjk_ime_agents = ["claude", "codex", "copilot"]
